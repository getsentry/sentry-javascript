  job_bun_integration_tests:
    name: Bun Integration Tests
    needs: [job_get_metadata, job_build]
    if: needs.job_build.outputs.changed_bun_integration == 'true' || github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
