        run: |
          cd packages/remix
          yarn test:integration:ci

  job_build_tarballs:
    name: Build tarballs
    # We want to run this if:
    # - The build job was successful, not skipped
    if: |
      always() &&
      needs.job_build.result == 'success'
    needs: [job_get_metadata, job_build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out current commit (${{ needs.job_get_metadata.outputs.commit_label }})
        uses: actions/checkout@v6
        with:
          ref: ${{ env.HEAD_COMMIT }}
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
      - name: Restore NX cache
        uses: actions/cache/restore@v5
        with:
          path: |
            .nx/cache
            .nx/workspace-data
          key: ${{ env.NX_CACHE_KEY }}

      - name: Restore caches
        uses: ./.github/actions/restore-cache
        with:
          dependency_cache_key: ${{ needs.job_build.outputs.dependency_cache_key }}

      - name: Build tarballs
        run: yarn build:tarball

      - name: Upload tarball artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-tarball-output
          path: ${{ env.TARBALL_ARTIFACT_GLOB }}
          if-no-files-found: error
          retention-days: 4
          compression-level: 6
          overwrite: true

  job_e2e_tests:
    name: E2E ${{ matrix.label || matrix.test-application }} Test
    # We need to add the `always()` check here because the previous step has this as well :(
    # See: https://github.com/actions/runner/issues/2205
    if:
      always() && needs.job_build_tarballs.result == 'success' && needs.job_build.outputs.e2e-matrix !='{"include":[]}'
    needs: [job_get_metadata, job_build, job_build_layer, job_build_tarballs]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      # We just use a dummy DSN here, only send to the tunnel anyhow
      E2E_TEST_DSN: 'https://username@domain/123'
      # Needed because some apps expect a certain prefix
      NEXT_PUBLIC_E2E_TEST_DSN: 'https://username@domain/123'
      PUBLIC_E2E_TEST_DSN: 'https://username@domain/123'
      REACT_APP_E2E_TEST_DSN: 'https://username@domain/123'
      E2E_TEST_SENTRY_ORG_SLUG: 'sentry-javascript-sdks'
      E2E_TEST_SENTRY_PROJECT: 'sentry-javascript-e2e-tests'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.job_build.outputs.e2e-matrix) }}
    steps:
      - name: Check out current commit (${{ needs.job_get_metadata.outputs.commit_label }})
        uses: actions/checkout@v6
        with:
          ref: ${{ env.HEAD_COMMIT }}
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 9.15.9
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: 'dev-packages/e2e-tests/test-applications/${{ matrix.test-application }}/package.json'
      - name: Set up Bun
        if:
          contains(fromJSON('["node-exports-test-app","nextjs-16-bun", "elysia-bun", "hono-4"]'),
          matrix.test-application)
        uses: oven-sh/setup-bun@v2
      - name: Set up AWS SAM
        if: matrix.test-application == 'aws-serverless' || matrix.test-application == 'aws-serverless-layer'
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Deno
        if: matrix.test-application == 'deno' || matrix.test-application == 'deno-streamed'
        uses: denoland/setup-deno@v2.0.4
        with:
          deno-version: v2.1.5
      - name: Restore caches
        uses: ./.github/actions/restore-cache
        with:
          dependency_cache_key: ${{ needs.job_build.outputs.dependency_cache_key }}

      - name: Restore tarball artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-tarball-output
          path: ${{ env.TARBALL_ARTIFACT_DOWNLOAD_PATH }}

      - name: Restore build layer artifacts
        uses: actions/download-artifact@v7
        if: matrix.test-application == 'aws-serverless' || matrix.test-application == 'aws-serverless-layer'
        with:
          name: build-layer-output
          path: ${{ env.BUILD_LAYER_PATH }}

      - name: Prepare e2e tests
        run: yarn test:prepare
        working-directory: dev-packages/e2e-tests

      - name: Validate e2e tests setup
        run: yarn test:validate
        working-directory: dev-packages/e2e-tests

      - name: Copy to temp
        run: yarn ci:copy-to-temp ./test-applications/${{ matrix.test-application }} ${{ runner.temp }}/test-application
        working-directory: dev-packages/e2e-tests

      - name: Add pnpm overrides
        run:
          yarn ci:pnpm-overrides ${{ runner.temp }}/test-application ${{ github.workspace
          }}/dev-packages/e2e-tests/packed
        working-directory: dev-packages/e2e-tests

      - name: Build E2E app
        working-directory: ${{ runner.temp }}/test-application
        timeout-minutes: 7
        run: ${{ matrix.build-command || 'pnpm test:build' }}
        env:
          SENTRY_E2E_WORKSPACE_ROOT: ${{ github.workspace }}

      - name: Install Playwright
        uses: ./.github/actions/install-playwright
        with:
          browsers: chromium
          cwd: ${{ runner.temp }}/test-application

      - name: Run E2E test
        working-directory: ${{ runner.temp }}/test-application
        timeout-minutes: 10
        run: ${{ matrix.assert-command || 'pnpm test:assert' }}
        env:
          SENTRY_E2E_WORKSPACE_ROOT: ${{ github.workspace }}

      - name: Upload Playwright Traces
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-traces-job_e2e_playwright_tests-${{ matrix.test-application}}
          path: ${{ runner.temp }}/test-application/test-results
          overwrite: true
          retention-days: 7

      - name: Pre-process E2E Test Dumps
        if: failure()
        run: |
          node ./scripts/normalize-e2e-test-dump-transaction-events.js

      - name: Upload E2E Test Event Dumps
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: E2E Test Dump (${{ matrix.label || matrix.test-application }})
          path: ${{ runner.temp }}/test-application/event-dumps
          overwrite: true
          retention-days: 7
          if-no-files-found: ignore

  # - We skip optional tests on release branches
  job_optional_e2e_tests:
    name: E2E ${{ matrix.label || matrix.test-application }} Test (optional)
    # We only run E2E tests for non-fork PRs because the E2E tests require secrets to work and they can't be accessed from forks
    # We need to add the `always()` check here because the previous step has this as well :(
    # See: https://github.com/actions/runner/issues/2205
    if:
      always() && needs.job_get_metadata.outputs.is_release != 'true' && needs.job_build_tarballs.result == 'success' &&
      needs.job_build.outputs.e2e-matrix-optional != '{"include":[]}' && (github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository) && github.actor != 'dependabot[bot]'
    needs: [job_get_metadata, job_build, job_build_tarballs]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      E2E_TEST_AUTH_TOKEN: ${{ secrets.E2E_TEST_AUTH_TOKEN }}
      E2E_TEST_DSN: ${{ secrets.E2E_TEST_DSN }}
      # Needed because some apps expect a certain prefix
      NEXT_PUBLIC_E2E_TEST_DSN: ${{ secrets.E2E_TEST_DSN }}
      PUBLIC_E2E_TEST_DSN: ${{ secrets.E2E_TEST_DSN }}
      REACT_APP_E2E_TEST_DSN: ${{ secrets.E2E_TEST_DSN }}
      E2E_TEST_SENTRY_ORG_SLUG: 'sentry-javascript-sdks'
      E2E_TEST_SENTRY_PROJECT: 'sentry-javascript-e2e-tests'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.job_build.outputs.e2e-matrix-optional) }}

    steps:
      - name: Check out current commit (${{ needs.job_get_metadata.outputs.commit_label }})
        uses: actions/checkout@v6
        with:
          ref: ${{ env.HEAD_COMMIT }}
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 9.15.9
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: 'dev-packages/e2e-tests/test-applications/${{ matrix.test-application }}/package.json'
      - name: Restore caches
        uses: ./.github/actions/restore-cache
        with:
          dependency_cache_key: ${{ needs.job_build.outputs.dependency_cache_key }}

      - name: Restore tarball artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-tarball-output
          path: ${{ env.TARBALL_ARTIFACT_DOWNLOAD_PATH }}

      - name: Prepare E2E tests
        run: yarn test:prepare
        working-directory: dev-packages/e2e-tests

      - name: Validate test setup
        run: yarn test:validate
        working-directory: dev-packages/e2e-tests

      - name: Copy to temp
        run: yarn ci:copy-to-temp ./test-applications/${{ matrix.test-application }} ${{ runner.temp }}/test-application
        working-directory: dev-packages/e2e-tests

      - name: Add pnpm overrides
        run:
          yarn ci:pnpm-overrides ${{ runner.temp }}/test-application ${{ github.workspace
          }}/dev-packages/e2e-tests/packed
        working-directory: dev-packages/e2e-tests

      - name: Build E2E app
        working-directory: ${{ runner.temp }}/test-application
        timeout-minutes: 7
        run: ${{ matrix.build-command || 'pnpm test:build' }}

      - name: Install Playwright
        uses: ./.github/actions/install-playwright
        with:
          browsers: chromium
          cwd: ${{ runner.temp }}/test-application

      - name: Run E2E test
        working-directory: ${{ runner.temp }}/test-application
        timeout-minutes: 10
        run: ${{ matrix.assert-command || 'pnpm test:assert' }}

      - name: Pre-process E2E Test Dumps
        if: failure()
        run: |
          node ./scripts/normalize-e2e-test-dump-transaction-events.js

      - name: Upload E2E Test Event Dumps
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: E2E Test Dump (${{ matrix.label || matrix.test-application }})
          path: ${{ runner.temp }}/test-application/event-dumps
          overwrite: true
          retention-days: 7
          if-no-files-found: ignore

  # -----------------------------------------------------------------------
  # Lighthouse CI — nightly + label-gated (ci:lighthouse)
  # NOT in job_required_jobs_passed — never blocks merges.
  # -----------------------------------------------------------------------

  job_lighthouse_matrix:
    name: Lighthouse Matrix
    needs: [job_get_metadata]
    runs-on: ubuntu-24.04
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ci:lighthouse'))
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Check out current commit (${{ needs.job_get_metadata.outputs.commit_label }})
        uses: actions/checkout@v6
        with:
          ref: ${{ env.HEAD_COMMIT }}
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
      - name: Generate matrix
        id: matrix
        # Script prints `matrix=<JSON>` to stdout; redirect to $GITHUB_OUTPUT so downstream
        # jobs can pick it up via ${{ needs.job_lighthouse_matrix.outputs.matrix }}.
        run: node dev-packages/lighthouse-tests/lighthouse-matrix.mjs >> "$GITHUB_OUTPUT"

  job_lighthouse:
    name: Lighthouse ${{ matrix.app }} (${{ matrix.mode }})
    needs: [job_get_metadata, job_build, job_build_tarballs, job_lighthouse_matrix]
    if: always() && needs.job_build_tarballs.result == 'success' && needs.job_lighthouse_matrix.result == 'success'
    runs-on: ubuntu-24.04-large-js
    timeout-minutes: 20
    continue-on-error: true
    strategy:
      fail-fast: false
      max-parallel: 15
      matrix: ${{ fromJson(needs.job_lighthouse_matrix.outputs.matrix) }}
    env:
      # Mirrors job_e2e_tests env block — apps expect framework-specific DSN prefixes.
      E2E_TEST_DSN: 'https://username@domain/123'
      NEXT_PUBLIC_E2E_TEST_DSN: 'https://username@domain/123'
      PUBLIC_E2E_TEST_DSN: 'https://username@domain/123'
      REACT_APP_E2E_TEST_DSN: 'https://username@domain/123'
      VITE_E2E_TEST_DSN: 'https://username@domain/123'
      NUXT_PUBLIC_E2E_TEST_DSN: 'https://username@domain/123'
    steps:
      - name: Check out current commit (${{ needs.job_get_metadata.outputs.commit_label }})
        uses: actions/checkout@v6
        with:
          ref: ${{ env.HEAD_COMMIT }}
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 9.15.9
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: 'dev-packages/e2e-tests/test-applications/${{ matrix.app }}/package.json'
      - name: Restore caches
        uses: ./.github/actions/restore-cache
        with:
          dependency_cache_key: ${{ needs.job_build.outputs.dependency_cache_key }}

      - name: Restore tarball artifacts
        uses: actions/download-artifact@v7
        with:
          name: build-tarball-output
          path: ${{ env.TARBALL_ARTIFACT_DOWNLOAD_PATH }}

      - name: Prepare E2E tests
        run: yarn test:prepare
        working-directory: dev-packages/e2e-tests

      - name: Validate E2E tests setup
        run: yarn test:validate
        working-directory: dev-packages/e2e-tests

      - name: Copy app to temp
        run: yarn ci:copy-to-temp ./test-applications/${{ matrix.app }} ${{ runner.temp }}/test-application
        working-directory: dev-packages/e2e-tests

      - name: Add pnpm overrides
        run:
          yarn ci:pnpm-overrides ${{ runner.temp }}/test-application ${{ github.workspace
          }}/dev-packages/e2e-tests/packed
        working-directory: dev-packages/e2e-tests

      - name: Build E2E app for Lighthouse
        working-directory: ${{ runner.temp }}/test-application
        timeout-minutes: 7
        run: pnpm test:build
        env:
          SENTRY_E2E_WORKSPACE_ROOT: ${{ github.workspace }}
          # Set under every common bundler env prefix so each app reads whichever its bundler exposes
          # (matrix.env-var-name is informational; we set all common prefixes here for simplicity).
          SENTRY_LIGHTHOUSE_MODE: ${{ matrix.mode }}
          NEXT_PUBLIC_SENTRY_LIGHTHOUSE_MODE: ${{ matrix.mode }}
          PUBLIC_SENTRY_LIGHTHOUSE_MODE: ${{ matrix.mode }}
          VITE_SENTRY_LIGHTHOUSE_MODE: ${{ matrix.mode }}
          NUXT_PUBLIC_SENTRY_LIGHTHOUSE_MODE: ${{ matrix.mode }}
          REACT_APP_SENTRY_LIGHTHOUSE_MODE: ${{ matrix.mode }}

      - name: Run Lighthouse CI
        # Pinned to a commit SHA (rather than the floating @v12 tag) to lock down the
        # supply chain: this third-party action also npm-installs @lhci/cli, so an
        # upstream tag-repoint could otherwise change what runs on our runners.
        # SHA is the current tip of v12. Bump deliberately when upgrading.
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          configPath: ${{ github.workspace }}/dev-packages/lighthouse-tests/lighthouserc.js
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 5
        env:
          # lighthouserc.js branches on these env vars at config-load time.
          LIGHTHOUSE_SERVE_MODE: ${{ matrix.serve }}
          LIGHTHOUSE_STATIC_DIR: ${{ runner.temp }}/test-application/${{ matrix.static-dir }}
          LIGHTHOUSE_START_CMD: cd ${{ runner.temp }}/test-application && ${{ matrix.start-cmd }}
          LIGHTHOUSE_READY_PATTERN: ${{ matrix.ready-pattern }}
          LIGHTHOUSE_URL: 'http://localhost:3000/'

      - name: Upload Lighthouse results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lighthouse-${{ matrix.app }}-${{ matrix.mode }}
          path: .lighthouseci/
          retention-days: 7
          if-no-files-found: ignore

  job_lighthouse_report:
    name: Lighthouse Report
    needs: [job_get_metadata, job_build, job_lighthouse, job_lighthouse_matrix]
    if: always() && needs.job_lighthouse_matrix.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out current commit (${{ needs.job_get_metadata.outputs.commit_label }})
        uses: actions/checkout@v6
        with:
          ref: ${{ env.HEAD_COMMIT }}
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
      - name: Restore caches
        uses: ./.github/actions/restore-cache
        with:
          dependency_cache_key: ${{ needs.job_build.outputs.dependency_cache_key }}
      - name: Download all Lighthouse artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: lighthouse-*
          path: lighthouse-results/
      - name: Generate report
        run: node dev-packages/lighthouse-tests/post-comment.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IS_PR: ${{ github.event_name == 'pull_request' }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

  job_required_jobs_passed:
    name: All required jobs passed or were skipped
    needs:
      [
        job_build,
        job_build_bundles,
        job_build_layer,
        job_build_tarballs,
        job_browser_unit_tests,
        job_bun_unit_tests,
        job_deno_unit_tests,
        job_node_unit_tests,
        job_node_integration_tests,
        job_node_core_integration_tests,
        job_cloudflare_integration_tests,
        job_bun_integration_tests,
        job_browser_playwright_tests,
        job_browser_loader_tests,
        job_remix_integration_tests,
        job_e2e_tests,
        job_artifacts,
        job_lint,
        job_check_lockfile,
        job_check_format,
        job_circular_dep_check,
        job_size_check,
      ]
    # Always run this, even if a dependent job failed
    if: always()
    runs-on: ubuntu-24.04
    permissions:
      issues: write
      checks: read
    steps:
      - name: Check out current commit
        if: github.ref == 'refs/heads/develop' && contains(needs.*.result, 'failure')
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github
            scripts

      - name: Create issues for failed jobs
        if: github.ref == 'refs/heads/develop' && contains(needs.*.result, 'failure')
        uses: actions/github-script@v7
        with:
          script: |
            const { default: run } = await import(
              `${process.env.GITHUB_WORKSPACE}/scripts/report-ci-failures.mjs`
            );
            await run({ github, context, core });

      - name: Check for failures
        if: cancelled() || contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "One of the dependent jobs have failed. You may need to re-run it." && exit 1
