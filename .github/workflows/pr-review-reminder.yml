name: 'PR: Review Reminder'

on:
  workflow_dispatch:
  schedule:
    # Run every day at 10:00 AM UTC
    - cron: '0 10 * * *'

permissions:
  pull-requests: write
  issues: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  remind-reviewers:
    runs-on: ubuntu-latest
    steps:
      - name: Remind pending reviewers
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const now = new Date();
            const THRESHOLD_MS = 48 * 60 * 60 * 1000; // 48 hours
            const REMINDER_MARKER = '<!-- review-reminder -->';

            // Fetch all open PRs
            const prs = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });

            core.info(`Found ${prs.length} open PRs`);

            for (const pr of prs) {
              // Skip draft PRs
              if (pr.draft) continue;

              // Get currently requested reviewers (only those who haven't reviewed yet)
              const { data: requested } = await github.rest.pulls.listRequestedReviewers({
                owner,
                repo,
                pull_number: pr.number,
              });

              const pendingReviewers = requested.reviewers;
              if (pendingReviewers.length === 0) continue;

              // Get timeline events to find when each review was requested
              const timeline = await github.paginate(github.rest.issues.listEventsForTimeline, {
                owner,
                repo,
                issue_number: pr.number,
                per_page: 100,
              });

              // For each pending reviewer, find the most recent review_requested event
              const overdueReviewers = [];
              for (const reviewer of pendingReviewers) {
                const reviewRequestEvents = timeline
                  .filter(
                    e =>
                      e.event === 'review_requested' &&
                      e.requested_reviewer?.login === reviewer.login,
                  )
                  .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

                if (reviewRequestEvents.length === 0) continue;

                const requestedAt = new Date(reviewRequestEvents[0].created_at);
                const age = now - requestedAt;

                if (age >= THRESHOLD_MS) {
                  overdueReviewers.push(reviewer.login);
                }
              }

              if (overdueReviewers.length === 0) continue;

              // Fetch existing comments to avoid double-nagging the same reviewer
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number: pr.number,
                per_page: 100,
              });

              const reminderComments = comments.filter(
                c =>
                  c.user.login === 'github-actions[bot]' && c.body.includes(REMINDER_MARKER),
              );

              // Only nag reviewers who haven't been reminded yet on this PR
              const alreadyReminded = new Set();
              for (const comment of reminderComments) {
                for (const login of overdueReviewers) {
                  if (comment.body.includes(`@${login}`)) {
                    alreadyReminded.add(login);
                  }
                }
              }

              const newOverdueReviewers = overdueReviewers.filter(
                login => !alreadyReminded.has(login),
              );

              if (newOverdueReviewers.length === 0) continue;

              const mentions = newOverdueReviewers.map(login => `@${login}`).join(', ');
              const body = `${REMINDER_MARKER}\n👋 ${mentions} — you were requested to review this PR more than 48 hours ago. Could you please take a look when you get a chance? Thank you!`;

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body,
              });

              core.info(`Posted review reminder on PR #${pr.number} for: ${mentions}`);
            }
