version: '3.9'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: always
    container_name: integration-tests-tedious
    ports:
      - '1433:1433'
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: 'TESTing123'
    healthcheck:
      test: ['CMD-SHELL', '/opt/mssql-tools18/bin/sqlcmd -S localhost -U SA -P "TESTing123" -C -Q "SELECT 1"']
      interval: 2s
      timeout: 3s
      retries: 30
      start_period: 20s
